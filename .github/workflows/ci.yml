name: CI

on:
  push:
    branches: [main, nightly]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip ruff pillow
      - run: python -m py_compile claude_any.py claude-any-menu.py claude-any-tool-guard.py scripts/make_demo_assets.py
      - run: python -m ruff check .
      - run: npm test
      - run: npm pack --dry-run
